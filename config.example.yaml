server:
  host: 127.0.0.1
  port: 9867
  read_timeout_seconds: 60
  write_timeout_seconds: 600

auth:
  api_keys:
    - local-dev-key

upstream:
  mode: api_key
  base_url: https://api.openai.com
  api_key: sk-your-openai-key
  timeout_seconds: 600

# Optional multi-account mode. When `upstreams` is non-empty it takes precedence
# over the legacy single `upstream` block above.
# upstreams:
#   - name: primary
#     mode: api_key
#     base_url: https://api.openai.com
#     api_key: sk-primary
#     timeout_seconds: 600
#     priority: 10
#     cooldown_seconds: 300
#     default_model: gpt-4.1
#     model_mapping:
#       gpt-4.1: gpt-4.1
#   - name: backup
#     mode: api_key
#     base_url: https://api.openai.com
#     api_key: sk-backup
#     timeout_seconds: 600
#     priority: 20
#     cooldown_seconds: 300
#     default_model: gpt-4.1-mini

oauth:
  callback_host: localhost
  callback_port: 1455
  callback_path: /auth/callback
  credentials_file: ~/.codex-gateway/openai-oauth.json
  auto_open_browser: true

runtime:
  dir: ~/.codex-gateway
  pid_file: ~/.codex-gateway/codex-gateway.pid
  log_file: ~/.codex-gateway/codex-gateway.log
  state_file: ~/.codex-gateway/codex-gateway.json

logging:
  level: info
  debug_dump_http: false

compat:
  enable_alias_routes: true
